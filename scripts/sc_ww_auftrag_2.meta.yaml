    description: "TRUNCATE clsc_ww_auftragsperre, clsc_ww_auftragsperre_1, clsc_ww_auftragsperre_d"
  - id: "2.2"
    description: "INSERT ALL aus st_ww_auftragsperre_b -> clsc_ww_auftragsperre_1 (N/U) / clsc_ww_auftragsperre_d (D)"
  - id: "2.3"
    description: "Statistiken: PKG_STATS.GATHERTABLE fuer clsc_ww_auftragsperre_1 und clsc_ww_auftragsperre_d"
  - id: "2.4"
    description: "Error Handling: PKG_IM_LADUNG.P_SC_ERROR_HANDLING auf clsc_ww_auftragsperre, Key id_key"
  - id: "2.5"
    description: "Referenzaufloesung: INSERT FIRST aus clsc_ww_auftragsperre_1 mit 6 LEFT OUTER JOINs; Fehler -> clsc_ww_auftragsperre_e, valide -> clsc_ww_auftragsperre"
  - id: "2.6"
    description: "Statistiken: PKG_STATS.GATHERTABLE fuer clsc_ww_auftragsperre und clsc_ww_auftragsperre_e"

