  - termin   # Prozessdatum, filtert dwh_processdate

packages:
  - PKG_STATS.GATHERTABLE
  - PKG_IM_LADUNG.P_SC_ERROR_HANDLING

sections:
  - id: "1"
    description: "Source Core-Ladung Auftragspositionen (sc_ww_auftragpos / sc_ww_auftragpos_ver)"
  - id: "1.1"
    description: "TRUNCATE clsc_ww_auftragpos, clsc_ww_auftragpos_1, clsc_ww_auftragpos_d"
  - id: "1.2"
    description: "INSERT ALL aus st_ww_auftragpos_b -> clsc_ww_auftragpos_1 (N/U) / clsc_ww_auftragpos_d (D)"
  - id: "1.3"
    description: "Statistiken: PKG_STATS.GATHERTABLE fuer clsc_ww_auftragpos_1 und clsc_ww_auftragpos_d"
  - id: "1.4"
    description: "Error Handling: PKG_IM_LADUNG.P_SC_ERROR_HANDLING auf clsc_ww_auftragpos, Key id_key,id"
  - id: "1.5"
    description: "Referenzaufloesung: INSERT FIRST aus clsc_ww_auftragpos_1 mit 30 LEFT OUTER JOINs; Fehler -> clsc_ww_auftragpos_e, valide -> clsc_ww_auftragpos"
  - id: "1.6"
    description: "Statistiken: PKG_STATS.GATHERTABLE fuer clsc_ww_auftragpos und clsc_ww_auftragpos_e"
  - id: "2"
    description: "Source Core-Ladung Auftragssperren (sc_ww_auftragsperre / sc_ww_auftragsperre_ver)"
