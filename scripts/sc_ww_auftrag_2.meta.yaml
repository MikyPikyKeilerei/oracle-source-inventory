job_name: sc_ww_auftrag_2
description: "Ladung der Smaragd-Auftragspositionen und Auftragssperren ins Source-Core. Verarbeitet zwei Entitaeten sequenziell: (1) sc_ww_auftragpos inkl. Versionstabelle sowie (2) sc_ww_auftragsperre inkl. Versionstabelle. Pro Entitaet: Cleanse-Zwischentabellen laden, Referenzaufloesung gegen SC-Lookup-Tabellen, Error-Handling in _e-Tabellen."
type: script
created_at: "2016-11-17"
created_by: "Andrea Gagulic"
last_changed: "2021-09-23"
last_changed_by: tetfra
