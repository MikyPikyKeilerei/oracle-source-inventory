job: dm_f_ecat
sst_fokus: WW   # &5=WW, &6=1
script_version: "##.37 (2025-06-16)"

# ─── UPSTREAM JOBS ────────────────────────────────────────────────────────────
upstream_jobs:
  - job: CC_WW_BUCHUNG
    gate: B
    bedingung: LV-Tag + dwh_noofrows>0 in udwh_loadhistory (heute)
    liefert: cc_buchung
    db_kontext: UDWH

  - job: CC_WW_KUNDE
    gate: C
    bedingung: LV-Tag + dwh_noofrows>0 in udwh_dh.udwh_loadhistory@DBL_LOADER() (heute)
    liefert: cc_kunde_{vtsaison}
    db_kontext: udwh_dh via DB-Link → im Ziel konsolidieren!

  - job: UNBEKANNT
    gate: keins
    liefert: cc_snow_attribution
    hinweis: Kein Gate → kein expliziter Upstream-Check. Klären!

# ─── VOLLSTÄNDIGE QUELL-TABELLEN → STEP-ZUORDNUNG ────────────────────────────
source_table_usage:

  cc_buchung:
    geladen_von: CC_WW_BUCHUNG
    steps:
      - step: "1"   zweck: Auftragskennzahlen (auftraege, auftraegeovf)
      - step: "3a"  zweck: Buchungsfakten (alle Kennzahlen), JOIN auf _2+_1

  cc_kunde_{vtsaison}:
    geladen_von: CC_WW_KUNDE
    steps:
      - step: "2"   zweck: Kundenstamm (jahrgang, vtinfogrp, mehrlinien, wechselkurs, shopanteiligkeit)

  cc_snow_attribution:
    geladen_von: UNBEKANNT
    steps:
      - step: "5.1"  zweck: Attribution (factor_percent, ecc)
                     filter: auftrart=4 (nur Internet), valid_from≤termin≤valid_to

  cc_firma:
    steps:
      - step: "1"    zweck: firma IN (SELECT wert WHERE sst IN (&6))  ← SST-Filter
      - step: "2"    zweck: JOIN auf valid_from/to, firma-Filter
      - step: "3a"   zweck: firma IN (SELECT wert WHERE sst IN (&6))  ← SST-Filter
      - step: "8"    zweck: JOIN für bez = firmabez (dwh_status=1)
      - step: "8b"   zweck: JOIN für bez = firmabez (dwh_status=1)

  cc_firma_akt_v:
    typ: VIEW
    steps:
      - step: "5.1"  zweck: firma IN (SELECT wert WHERE sst IN (&6))  ← SST-Filter Attribution

  cc_vtinfogrp:
    steps:
      - step: "2"    zweck: JOIN (vtinfogrp, dwh_valid_from/to), sg!=9999 Filter
      - step: "9"    zweck: verd1sort4 = vtinfogrp_a14 (Verdichtung)
      - step: "9b"   zweck: verd1sort4 = vtinfogrp_a14

  cc_land:
    steps:
      - step: "2"    zweck: JOIN für Währungsermittlung (land→waehrung)

  cc_waehrung:
    steps:
      - step: "2"    zweck: waehrungsumrkurs → wechselkurs

  cc_bestellkanal_akt_v:
    typ: VIEW
    steps:
      - step: "5.1"  zweck: JOIN auf ecc, auftrart=4 Filter → bestellkanal für Attribution

  cc_bestellkanal:
    steps:
      - step: "9"    zweck: verd1sort4 = bestellkanal_a14 (Verdichtung)
      - step: "9b"   zweck: verd1sort4 = bestellkanal_a14

  cc_katart:
    steps:
      - step: "9"    zweck: verd1sort2 = katart_a12 (Verdichtung)
      - step: "9b"   zweck: verd1sort2 = katart_a12

  cc_art:
    steps:
      - step: "9"    zweck: bestandsfirma
      - step: "9b"   zweck: bestandsfirma

  cc_marktkz:
    typ: LEFT OUTER JOIN
    steps:
      - step: "9"    zweck: marktkz → obermarktkz (Kette für marktkz_a12)
      - step: "9b"   zweck: marktkz → obermarktkz

  cc_obermarktkz:
    typ: LEFT OUTER JOIN
    steps:
      - step: "9"    zweck: verd1sort1 = marktkz_a12
      - step: "9b"   zweck: verd1sort1 = marktkz_a12

  cc_kalender:
    steps:
      - step: "9"    zweck: CURSOR DISTINCT witt_woche_id (hjanfang–datum), start/ende
      - step: "9b"   zweck: CURSOR DISTINCT witt_woche_id
      - step: "A4"   zweck: SELECT witt_woche_id WHERE tag_datum=&datum → LIST-Partition

  cc_fakturakalenderlv:
    steps:
      - gate: B      zweck: LV-Tag-Check (lvdat=@D(T), dwh_valid_to=31.12.9999)
      - gate: C      zweck: LV-Tag-Check

  udwh_loadhistory:
    lesen:
      - gate: B      zweck: CC_WW_BUCHUNG Erfolg (dwh_process, dwh_runnumber=1, noofrows>0)
    schreiben:
      - step: A7     zweck: PKG_IM_LADUNG.P_LOADHISTORY → downstream Gates

  udwh_dh.udwh_loadhistory:
    via: "@DBL_LOADER() – anderer DB-Kontext!"
    lesen:
      - gate: C      zweck: CC_WW_KUNDE Erfolg

  GBV_BATCH_JOB:
    lesen:
      - gate: A      zweck: BAJ_IPAR_1=@JB() → kein paralleler Lauf
      - gate: D      zweck: BAJ_IPAR_4=&6 → kein paralleler SST-Lauf

# ─── STAGING CHAIN (vollständig mit echten JOINs) ────────────────────────────
staging_chain:

  - step: "0"
    aktion: TRUNCATE
    targets: [_1, _2, _3, _4, _5, _6, _7, brutto, netto, kwkum_brutto, kwkum_netto]

  - step: "1"
    sources: [cc_buchung]
    target: cldm_{sst}_f_ecat_1
    key_output: [auftrnr_key, konto_id_key, buchdat, auftraege, auftraegeovf]
    filter:
      - ansprmenge > 0
      - buchdat BETWEEN &hjanfang AND &datum
      - artnr != 992444
      - vfart NOT IN (2,4)
      - firma IN SST, NOT IN (13,14,35)
      - vtg != 21
    berechnung:
      auftraege: "1 / SUM(meterware=2 ? SIGN(ansprmenge) : ansprmenge)"
      auftraegeovf: "1 / SUM(... WHERE vfart=1)"

  - step: "2"
    sources: [cc_kunde_{vtsaison}, cc_vtinfogrp, cc_firma, cc_land, cc_waehrung]
    target: cldm_{sst}_f_ecat_2
    key_output: [konto_id_key, jahrgang, firma, vtinfogrp, wechselkurs, shopanteiligkeit]
    filter:
      - dwh_status IN (1,2)
      - sg != 9999
      - firma IN SST, NOT IN (13,14,35)
      - kdart != 21
      - kontoart = 1
    dynamic_sql:
      bedingung: "&datum >= DATE '2021-07-01'"
      ja: shopanteiligkeit aus cc_kunde_{vtsaison}
      nein: shopanteiligkeit = -2

  - step: "3a"
    sources: [cc_buchung, cldm_{sst}_f_ecat_2, cldm_{sst}_f_ecat_1]
    target: cldm_{sst}_f_ecat_3
    join_typ: "_3a = cc_buchung JOIN _2 (INNER) LEFT JOIN _1"
    join_key_buchung_2: "b.konto_id_key=e.konto_id_key AND b.firma=e.firma AND b.buchdat BETWEEN hjanfang/datum AND Filter"
    join_key_buchung_1: "b.auftrnr_key=k.auftrnr_key AND b.konto_id_key=k.konto_id_key AND b.buchdat=k.buchdat"
    key_output: [alle Buchungs-Kennzahlen, auftraege verteilt, bruttonetto, bestellkanal, ecc]
    berechnung:
      auftraege: "k.auftraege * (meterware=2 ? SIGN(ansprmenge) : ansprmenge)"
      bestellkanal_heine: "firma∈(48-52) AND bestellkanal=-3 → IF auftrart=4 THEN 16 ELSE auftrart"
      bestellmedium: "4 (Landscape) → 2 (Tablet)"
    attr_felder: NULL (noch nicht befüllt)
    warnung: Erster von zwei Schreibvorgängen auf _3

  - step: "5.1"
    sources: [cc_snow_attribution, cc_bestellkanal_akt_v, cc_firma_akt_v, cldm_{sst}_f_ecat_3]
    target: cldm_{sst}_f_ecat_5
    zwei_inserts:
      insert_1:
        name: Aktuelle Saison
        filter: "TRUNC(auftrdat+1) BETWEEN &hjanfang AND &datum"
      insert_2:
        name: Altdaten vor Saisonanfang
        filter: "TRUNC(auftrdat+1) < &hjanfang AND (auftrnr_key,firma) IN (SELECT FROM _3)"
    gemeinsame_filter:
      - "&termin BETWEEN dwh_valid_from AND dwh_valid_to"
      - "firma IN SST (cc_firma_akt_v)"
      - "konto_id_key IS NOT NULL"
      - "auftrart = 4  ← NUR Internet"
    key_output: [auftrnr_key, konto_id_key, firma, factor_percent, ecc, bestellkanal]

  - step: "5.2"
    sources: [cldm_{sst}_f_ecat_3, cldm_{sst}_f_ecat_5, cldm_{sst}_f_ecat_1]
    target: cldm_{sst}_f_ecat_6
    zwei_inserts:
      insert_1:
        name: Normalfall
        join: "_3 JOIN _5 ON (auftrnr_key AND konto_id_key GLEICH)"
      insert_2:
        name: Retoure (Kontonummer ändert sich)
        join: "_3 JOIN _5 ON (auftrnr_key AND konto_id_key UNGLEICH)"
    left_join: "_1 ON (auftrnr_key + konto_id_key + buchdatnr) → auftraege für attr"
    berechnung:
      ansprwert_attr:  "factor_percent * ansprohnerabattwert (wenn != 0)"
      numswert_attr:   "factor_percent * numsohnerabattwert (wenn != 0)"
      auftraege_attr:  "k.auftraege * ansprmenge * factor_percent (wenn ansprmenge > 0)"
    key_output: [buchdatnr, auftrdat, firma, konto_id_key, auftrnr_key, auftrpos, art_id, promnr, ecc, bestellkanal, ansprwert_attr, numswert_attr, auftraege_attr]

  - step: "3b"
    sources: [cldm_{sst}_f_ecat_6, cldm_{sst}_f_ecat_3]
    target: cldm_{sst}_f_ecat_3
    join: "_6 attr JOIN _3 ecat ON (auftrnr_key+buchdatnr+auftrpos+art_id+promnr+firma)"
    warnung: ZWEITER Schreibvorgang – _3 ist NICHT leer!
    logik: |
      Neue Zeilen mit:
        - Alle regulären Kennzahlen = 0 (auftraege, ansprwert, brabswert, etc.)
        - Kundendaten (vtinfogrp, jahrgang, ...) aus ecat (_3 Zeile)
        - ecc + bestellkanal aus attr (_6 = Attributions-Kanal)
        - bestellkanalpaid = attr.bestellkanal
        - ansprwert_attr, numswert_attr, auftraege_attr aus attr
    migration_risiko: HOCH

  - step: "6"
    sources: [cldm_{sst}_f_ecat_3]
    target: cldm_{sst}_f_ecat_7
    logik: "GROUP BY alle Dimensionen, SUM alle Kennzahlen (regulär + attr)"
    group_by:
      [buchdatnr, firma, vtinfogrp, anlaktionscode, altjungakt, mehrlinien, jahrgang,
       onlinetest, konto_id_key, auftrnr_key, auftrpos, katart, art_id, artnr, promnr,
       artgr, wechselkurs, ecc, auftrart, bruttonetto, bestellkanal, appinfo, bestellmedium,
       auftrdat, anlvtsaison, bestellkanalpaid, umseksaison, shopanteiligkeit]

  - step: "7"
    sources: [cldm_{sst}_f_ecat_3]
    target: cldm_{sst}_f_ecat_4
    logik: |
      anzeinzelpos = COUNT(DISTINCT artnr||'*'||artgr WHERE ansprmenge>0)
      anzgesamtpos = COUNT(DISTINCT artnr||'*'||promnr||'*'||artgr||'*'||auftrpos WHERE ansprmenge>0)
    group_by: [auftrnr_key, artnr, artgr]

  - step: "8"
    sources: [cldm_{sst}_f_ecat_7, cc_firma, cldm_{sst}_f_ecat_4]
    target: cldm_{sst}_f_ecat_brutto
    join_firma: "c.firma=b.wert AND b.dwh_status=1  → bez=firmabez"
    join_pos: "LEFT JOIN _4 ON (auftrnr_key+artnr+artgr) → anzeinzelpos, anzgesamtpos"
    filter: KEIN bruttonetto-Filter → ALLE Zeilen
    berechnung:
      alterswert: "SUBSTR(buchdatnr,1,4) - jahrgang (0 wenn jahrgang=0)"
      artikelposition: "anzeinzelpos/anzgesamtpos (wenn ansprmenge>0 AND anzgesamtpos>0)"
      katart: "NULL AND firma=74 → -2 (Sheego-Fix ##.37)"
      appinfo: "buchdatnr≤20200930 AND NOT IN(-3,-2) → -2"
      bestellmedium: "buchdatnr≤20200930 AND NOT IN(-3,-2) → -2"

  - step: "8b"
    sources: [cldm_{sst}_f_ecat_7, cc_firma, cldm_{sst}_f_ecat_4]
    target: cldm_{sst}_f_ecat_netto
    identisch_mit: "Step 8"
    zusaetzlicher_filter: "WHERE c.bruttonetto IN (1, -3)"
    brutto_netto_diff: "Einziger Unterschied zu Brutto!"

  - step: "9"
    sources:
      cursor: cc_kalender (DISTINCT witt_woche_id BETWEEN hjanfang AND datum)
      daten: cldm_{sst}_f_ecat_brutto
      dims: [cc_vtinfogrp, cc_bestellkanal, cc_katart, cc_art, cc_marktkz(L), cc_obermarktkz(L)]
    target: cldm_{sst}_f_ecat_kwkum_brutto
    logik: |
      PL/SQL-Loop: je Woche ein INSERT + COMMIT
      Filter: buchdatnr BETWEEN witt_woche_start_tag AND witt_woche_ende_tag
      Verdichtungen: marktkz_a12 (verd1sort1), katart_a12 (verd1sort2),
                     vtinfogrp_a14 (verd1sort4), bestellkanal_a14 (verd1sort4)
    group_by:
      [witt_woche_id, witt_woche_ende_tag, marktkz_a12, alterswert, altjungakt,
       anlaktionscode, bestellkanal_a14, ecc, firmabez, jahrgang, katart_a12,
       onlinetest, mehrlinien, vtinfogrp_a14, wechselkurs, bestandsfirma]

  - step: "9b"
    sources: analog_9 mit cldm_{sst}_f_ecat_netto
    target: cldm_{sst}_f_ecat_kwkum_netto

# ─── ABSCHLUSS LINEAGE ────────────────────────────────────────────────────────
abschluss:
  A1: "PKG_IM_PARTITION.P_ADD_RANGEPARTITION → dm_f_ecat_brutto + netto, Key=YYYYMM"
  A2: "Cursor(DISTINCT firmabez,buchdat FROM stage_brutto) → TRUNCATE SUBPARTITION"
  A3: "PKG_IM_LADUNG.P_LADUNG_BEW: stage_brutto→dm_f_ecat_brutto, stage_netto→dm_f_ecat_netto"
  A4: "SELECT witt_woche_id FROM cc_kalender WHERE tag_datum=&datum → P_ADD_LISTPARTITION"
  A5: "Cursor(DISTINCT firmabez,wittwochenr FROM stage_kwkum_brutto) → TRUNCATE SUBPARTITION"
  A6: "PKG_IM_LADUNG.P_LADUNG_BEW: kwkum_brutto/netto → dm_f_ecat_kwkum_brutto/netto"
  A7: "PKG_IM_LADUNG.P_LOADHISTORY(:DSV_ABSCHLUSS_ID) → udwh_loadhistory"

# ─── DOWNSTREAM ───────────────────────────────────────────────────────────────
downstream:
  tabellen: [dm_f_ecat_brutto, dm_f_ecat_netto, dm_f_ecat_kwkum_brutto, dm_f_ecat_kwkum_netto]
  konsumenten: noch zu erfassen (Power BI / Gold-Layer)

# ─── OFFENE PUNKTE ────────────────────────────────────────────────────────────
open_issues:
  - id: OI-1
    titel: cc_snow_attribution Upstream-Job
    priorität: HOCH
    beschreibung: Kein Gate → unklar ob und wann die Tabelle aktuell ist.

  - id: OI-2
    titel: bruttonetto=2 – fachliche Bedeutung
    priorität: HOCH
    beschreibung: |
      Netto = bruttonetto IN (1,-3). Was ist bruttonetto=2?
      Brutto-Kunden ohne Netto-Berechtigung? Klären für Validierung.

  - id: OI-3
    titel: limango-Status
    priorität: MITTEL
    beschreibung: |
      DELETE WHERE firmabez='limango DE' ist auskommentiert.
      Ist limango aus cc_firma SST entfernt oder muss Delete reaktiviert werden?

  - id: OI-4
    titel: Downstream-Konsumenten
    priorität: MITTEL
    beschreibung: Welche Reports/Gold-Layer-Jobs lesen die vier Zieltabellen?

  - id: OI-5
    titel: Gate D BAJ_IPAR_4 bestätigen
    priorität: NIEDRIG
    beschreibung: Wert=&6 ist abgeleitet, nicht aus DSV-GUI bestätigt.
