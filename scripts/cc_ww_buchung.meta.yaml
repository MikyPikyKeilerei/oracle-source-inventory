precondition_tables:
  - GBV_BATCH_JOB        # Gate A: Exklusivität (kein paralleler Lauf)
  - udwh_loadhistory     # Gate B: CC_WW_BUCHUNG Erfolg

precondition_processes:
  - CC_WW_BUCHUNG        # Gate B: liefert sc_ww_buchung
  - SC_WW_AUFTRAG        # Unsicherheit: sc_ww_auftragkopf_ver / auftragpos_ver upstream?

parameters:
  - termin        # Prozessdatum; Filter auf dwh_processdate
  - gbvid         # Run-ID → dwh_cr_load_id
  - vtsaison      # Aktuelle VT-Saison (z.B. 103)
  - vtsaisonm1    # VT-Saison - 1
  - vtsaisonm2    # VT-Saison - 2
  - vtsaisonp1    # VT-Saison + 1

packages:
  - PKG_IM_VERTRIEBSGEBIET   # Währungsumrechnung + VTG-Auflösung (Kernpaket)
  - PKG_STATS                # Tabellenstatistiken sammeln

