job_name: sc_ww_kunde
description: "Laedt Kundenstammdaten aus der Stage-Backup-Tabelle st_ww_kunde_b in die Cleanse-Schicht (clsc_ww_kunde*) mit anschliessender Referenzaufloesung auf 30 SC-Lookup-Tabellen. Verarbeitet Insert-, Update- und Delete-Saetze (dwh_stbflag N/U/D). Datensaetze mit fehlgeschlagener Referenzaufloesung werden in die Fehler-Tabelle clsc_ww_kunde_e ausgesteuert."
type: script
created_at: "xx.04.2016"
created_by: "Stefan Ernstberger"
last_changed: "11.07.2024"
last_changed_by: steern
change_count: 11
confluence_url: ""
migration_status: pending

target_table: sc_ww_kunde

cleanse_tables:
  - clsc_ww_kunde       # finale INSERT-Ziel fuer gueltige Saetze
  - clsc_ww_kunde_1     # Zwischenstufe N/U-Saetze aus Stage
  - clsc_ww_kunde_d     # Zwischenstufe D-Saetze (Deletes)
  - clsc_ww_kunde_e     # Error-Tabelle: Saetze mit fehlgeschlagener Referenzaufloesung

source_tables:
  - st_ww_kunde_b       # Stage-Backup-Tabelle; gefiltert auf dwh_processdate = &termin
  - clsc_ww_kunde_1     # Zwischentabelle; Quelle fuer Referenzaufloesung in Abschnitt 1.5

lookup_tables:
