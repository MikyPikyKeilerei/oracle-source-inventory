precondition_tables: []
precondition_processes: []

parameters:
  - termin   # WHERE dwh_processdate = &termin
  - gbvid    # dwh_cr_load_id / dwh_up_load_id

packages:
  - PKG_STATS.GATHERTABLE
  - PKG_IM_LADUNG.P_SC_ERROR_HANDLING

sections:
  - id: "0"
    description: "Parameter-Ausgabe (PROMPT): termin, gbvid"
  - id: "1"
    description: "Source Core-Ladung Endtabelle sc_ww_kunde / sc_ww_kunde_ver"
  - id: "1.1"
    description: "Cleansing-Tabellen leeren: TRUNCATE clsc_ww_kunde, clsc_ww_kunde_1, clsc_ww_kunde_d"
  - id: "1.2"
    description: "INSERT ALL aus st_ww_kunde_b nach clsc_ww_kunde_1 (N/U) und clsc_ww_kunde_d (D)"
  - id: "1.3"
    description: "Statistiken: PKG_STATS.GATHERTABLE auf clsc_ww_kunde_1 und clsc_ww_kunde_d"
  - id: "1.4"
    description: "Error Handling: PKG_IM_LADUNG.P_SC_ERROR_HANDLING fuer clsc_ww_kunde / id_key"
  - id: "1.5"
    description: "INSERT FIRST aus clsc_ww_kunde_1 mit 30 LEFT OUTER JOINs auf SC-Lookup-Tabellen; Fehler-Saetze nach clsc_ww_kunde_e, gueltige nach clsc_ww_kunde"
  - id: "1.6"
    description: "Statistiken: PKG_STATS.GATHERTABLE auf clsc_ww_kunde und clsc_ww_kunde_e"
  - id: "1.7"
    description: "Fehler-Check: DECLARE-Block prueft COUNT(*) aus clsc_ww_kunde_e; RAISE_APPLICATION_ERROR(-20029) bei > 0 Eintraegen"

notes: |
  - Unsicherheit: created_at im Header als 'xx.04.2016' angegeben; genauer Tag unbekannt.
  - Unsicherheit: Die Endtabellen sc_ww_kunde und sc_ww_kunde_ver sind deklariert, aber dieses
    Script schreibt nur in clsc_ww_kunde. Uebernahme nach sc_ww_kunde/_ver erfolgt durch
    nachgelagerten Prozess (nicht im Code sichtbar).
  - sc_ww_kunde_ver erscheint nur im Header als Endtabelle, nicht im ausfuehrbaren Code.
  - dwh_id_sc_ww_newsletter und dwh_id_sc_ww_nlabonnentstatus werden hartcodiert gesetzt
    (Werte 25314038739 bzw. 25314038757); laut Kommentar 'mittlerweile obsolet'.
  - sc_ww_adreinw ist laut Code-Kommentar ein Synonym auf sc_ww_telemkeinw.
  - Referenzaufloesung auf sc_ww_newsletter und sc_ww_nlabonnentstatus wurde 22.02.2024 entfernt.
  - Keine DB-Links im ausfuehrbaren Code.
  - Keine GBV_BATCH_JOB- oder udwh_loadhistory-Preconditions.
  - ALTER SESSION ENABLE PARALLEL DML aktiv.
