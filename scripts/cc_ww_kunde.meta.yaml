notes: |
  - Script hat 127 Change-Log-Eintraege (2016–2025); explizite ##.N-Nummerierung nur bis ##10, danach freitext.
  - Erstellt-Datum im Header (01.07.2019) bezieht sich auf einen Rebuild/Neufassung; aelteste Aenderung ist 28.07.2016.
  - Firmen-Ausschluesse im Basis-Join (Step 1): firma NOT IN (4,7,16,20,24,26,27,45,46,47).
    Sheego (44) und Otto Marketplace (28) sind auskommentiert (koennen je Saison reaktiviert werden).
  - cc_firma_waepumig_v ist eine Uebergangsloesung fuer die Wäschepur-Migration (SG 18 vs. 68).
    Wenn alte Welt ausgestorben ist, kann auf cc_firma gewechselt werden.
  - DB-Link @udwh: nur fuer cc_nlabostatus@udwh in Step 7 (NL-Abostatus-Aufloesung).
  - F_GET_LAST_LVDAT: eingebaute Funktion (kein PKG_-Prefix), ermittelt letztes Ladedatum.
  - clcc_ww_kunde (Step 28) ist der Delta-Puffer; der eigentliche MERGE in cc_kunde_&vtsaison
    erfolgt vermutlich durch einen GBV-Scheduler-Step ausserhalb dieses Scripts.
  - Unsicherheit: sc_ww_vertrgebiet_ver im Header erwaehnt, aber im ausfuehrbaren Code nicht gefunden
    (moeglicherweise in einer frueheren Script-Version oder in einem anderen Job).
  - Unsicherheit: sam_wp_mb_hist (Waeschepur-Historientabelle, ##5) nur im Header-Kommentar erwaehnt,
    kein Vorkommen im ausfuehrbaren Code → vermutlich ausgebaut.
  - Keine GBV_BATCH_JOB- oder udwh_loadhistory-Precondition-Bloecke im Script sichtbar.
  - PARALLEL DML aktiviert (ALTER SESSION ENABLE PARALLEL DML) + /*+APPEND*/ / /*+parallel(N)*/ Hints.
  - cc_nkcodierung liegt laut Kommentar (##, 07.08.2019) jetzt auf UDWH1 (kein DB-Link noetig).
