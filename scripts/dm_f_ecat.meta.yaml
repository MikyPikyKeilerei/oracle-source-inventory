name: dm_f_ecat
type: procedure          # Oracle SQL*Plus Script
system_domain: eCAT / CC
runner: SQL*Plus
datenbank: UDWH
migration_status: in_progress
erstellt: 2017-02-15
letzte_aenderung: 2025-06-16  # ##.37 katart Sheego NULL-Fix

# ─── PARAMETER ────────────────────────────────────────────────────────────────
parameter:
  - name: datum
    typ: DATE
    verwendung: Prozessdatum; obere Grenze buchdat-Filter; Partitionsschlüssel
  - name: vtsaison
    typ: VARCHAR2
    verwendung: Suffix in cc_kunde_&vtsaison
  - name: gbvid
    typ: NUMBER
    verwendung: Run-ID → dwh_cr_load_id in allen Tabellen
  - name: hjanfang
    typ: DATE
    verwendung: Halbjahresanfang → untere Grenze buchdat-Filter in Step 1+3a+5
  - name: termin
    typ: DATE
    verwendung: Prüfzeitpunkt für dwh_valid_from/to in cc_snow_attribution (Gate 5.1)
  - name: "5"
    alias: sst_kuerzel
    werte: {WW: aktiv, FR: niedrig, US: niedrig}
  - name: "6"
    alias: sst_nummer
    werte: {WW: 1, FR: "2|3|9", US: 5}

# ─── GLOBALE FILTER (gelten in nahezu jedem Step) ────────────────────────────
globale_filter:
  - firma IN (SELECT wert FROM cc_firma WHERE sst IN (&6))   # SST-Einschränkung
  - firma NOT IN (13, 14, 35)                                 # Firmenausschluss
  - artnr != 992444                                           # VKP-Flatrate ausschließen
  - vfart NOT IN (2, 4)                                       # Fixer VF-Ausschluss
  - vtg != 21                                                 # Stationär-Bereinigung

# ─── QUELL-TABELLEN (vollständig) ────────────────────────────────────────────
source_tables:

  faktentabellen:
    - cc_buchung                    # Primäre Buchungsfakten → geladen von CC_WW_BUCHUNG
    - cc_kunde_{vtsaison}           # Kundenstamm saisonspezifisch → geladen von CC_WW_KUNDE
    - cc_snow_attribution           # Attribution (Internet-Aufträge) → Upstream-Job klären!

  dimensionen_lookup:
    - cc_firma                      # SST-Filter, firmabez (bez), dwh_status-Filter
    - cc_firma_akt_v                # VIEW: SST-Filter in Step 5 (cc_snow_attribution)
    - cc_vtinfogrp                  # Step 2 JOIN + Step 9 Verdichtung (verd1sort4)
    - cc_land                       # Step 2 JOIN (→ Währung)
    - cc_waehrung                   # Step 2 JOIN (wechselkurs)
    - cc_bestellkanal_akt_v         # VIEW: Step 5 JOIN (bestellkanal für Attributionen)
    - cc_bestellkanal               # Step 9 JOIN (Verdichtung verd1sort4)
    - cc_katart                     # Step 9 JOIN (Verdichtung verd1sort2)
    - cc_art                        # Step 9 JOIN (bestandsfirma)
    - cc_marktkz                    # Step 9 LEFT JOIN (→ obermarktkz)
    - cc_obermarktkz                # Step 9 LEFT JOIN (marktkz_a12 = verd1sort1)
    - cc_kalender                   # Step 9 Cursor (witt_woche_id, start/ende) + Abschluss

  gates_metadaten:
    - cc_fakturakalenderlv          # Gates B+C: LV-Tag-Check
    - udwh_loadhistory              # Gate B + Abschluss P_LOADHISTORY
    - udwh_dh.udwh_loadhistory      # Gate C via @DBL_LOADER()
    - GBV_BATCH_JOB                 # Gates A+D

# ─── STAGING-KETTE ────────────────────────────────────────────────────────────
steps:

  - step: 0
    name: TRUNCATE Staging
    targets: [cldm_{sst}_f_ecat_1..7, brutto, netto, kwkum_brutto, kwkum_netto]
    hinweis: Vollständig idempotent – kein Zustand aus vorherigen Läufen

  # ── STEP 1 ──────────────────────────────────────────────────────────────────
  - step: 1
    name: Auftragskennzahlen
    target: cldm_{sst}_f_ecat_1
    sources: [cc_buchung]
    output_spalten: [dwh_cr_load_id, auftrnr_key, konto_id_key, buchdat, auftraege, auftraegeovf]

    logik: |
      Auftragsanteil (auftraege) = 1 / SUM(ansprmenge) pro (auftrnr_key, konto_id_key, buchdat).
      Meterware-Sonderregel: meterware=2 → SIGN(ansprmenge) statt ansprmenge.
      auftraegeovf = analog, aber nur vfart=1.

    filter:
      - ansprmenge > 0
      - buchdat BETWEEN &hjanfang AND &datum
      - COALESCE(artnr,0) != 992444
      - vfart NOT IN (2, 4)
      - firma IN (SELECT wert FROM cc_firma WHERE sst IN (&6))
      - firma NOT IN (13, 14, 35)
      - vtg != 21

    group_by: [auftrnr_key, konto_id_key, buchdat]
    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 2 ──────────────────────────────────────────────────────────────────
  - step: 2
    name: Kundendaten
    target: cldm_{sst}_f_ecat_2
    sources: [cc_kunde_{vtsaison}, cc_vtinfogrp, cc_firma, cc_land, cc_waehrung]
    output_spalten:
      [dwh_cr_load_id, konto_id_key, jahrgang, firma, vtinfogrp, anlaktionscode,
       altjungakt, mehrlinien, wechselkurs, onlinetest, nettoausschluss, anlvtsaison, shopanteiligkeit]

    logik: |
      Kundenstamm mit Währungskurs und Vtinfogrp-Prüfung.
      jahrgang: gebdat.YYYY; ungültige Werte (< 1900 oder > SYSDATE.Jahr) → 0.
      mehrlinien < 0 → 0 (Negativwerte bereinigen).
      DYNAMIC SQL: shopanteiligkeit
        - &datum >= 2021-07-01 → aus cc_kunde_{vtsaison}
        - &datum <  2021-07-01 → Konstante -2

    joins:
      - cc_vtinfogrp ON (vtinfogrp=wert AND &datum BETWEEN dwh_valid_from AND dwh_valid_to)
      - cc_firma ON (firma=wert AND &datum BETWEEN dwh_valid_from AND dwh_valid_to)
      - cc_land ON (land=wert AND &datum BETWEEN dwh_valid_from AND dwh_valid_to)
      - cc_waehrung ON (waehrung=wert AND &datum BETWEEN dwh_valid_from AND dwh_valid_to)

    filter:
      - k.dwh_status IN (1, 2)      # aktuelle + gelöschte (Saisonende)
      - cvg.sg != 9999
      - k.firma IN (SELECT wert FROM cc_firma WHERE sst IN (&6))
      - k.firma NOT IN (13, 14, 35)
      - k.kdart != 21
      - k.kontoart = 1

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 3a ─────────────────────────────────────────────────────────────────
  - step: "3a"
    name: Buchungsdaten (erster Durchlauf)
    target: cldm_{sst}_f_ecat_3
    sources: [cc_buchung, cldm_{sst}_f_ecat_2, cldm_{sst}_f_ecat_1]
    warnung: ERSTER von zwei Schreibvorgängen auf _3

    output_spalten:
      [dwh_cr_load_id, buchdatnr, firma, vtinfogrp, anlaktionscode, altjungakt,
       mehrlinien, jahrgang, onlinetest, shopanteiligkeit, konto_id_key, auftrnr_key,
       auftrpos, katart, art_id, artnr, promnr, artgr,
       auftraege, auftraegeovf, ansprwert, ansprohnerabattwert, ansprmenge,
       ansprwertovf, ansprohnerabattwertovf, ansprmengeovf,
       brabswert, brabsohnerabattwert, brabsmenge,
       numsmenge, numswert, numsohnerabattwert,
       retwert, retohnerabattwert, retmenge,
       niliwert, niliohnerabattwert, nilimenge,
       naliwert, naliohnerabattwert, nalimenge,
       wechselkurs, ecc, auftrart, bestellkanal, bruttonetto,
       appinfo, bestellmedium, auftrdat, anlvtsaison, bestellkanalpaid, umseksaison]
    hinweis: ansprwert_attr / numswert_attr / auftraege_attr sind in 3a noch NULL

    logik: |
      JOIN cc_buchung b → cldm_&5._f_ecat_2 e (konto_id_key + buchdat-Range + Ausschlüsse)
      LEFT JOIN cldm_&5._f_ecat_1 k (auftrnr_key + konto_id_key + buchdat)
      → auftraege = k.auftraege * ansprmenge (verteilt Auftragsanteil auf Positionen)
      buchdatnr = TO_NUMBER(TO_CHAR(buchdat,'YYYYMMDD'))
      Meterware-Sonderregel (SIGN) bei menge-Aggregation.

    bestellkanal_sonderregel: |
      Heine (firma BETWEEN 48 AND 52) AND bestellkanal=-3:
        → IF auftrart=4 THEN 16 ELSE auftrart
      (Heine hatte in cc_buchung bestellkanal=-3 statt korrektem Wert)

    bestellmedium_sonderregel: |
      bestellmedium=4 (Landscape) → 2 (Tablet) umwandeln

    joins:
      - "cldm_{sst}_f_ecat_2 e ON (b.konto_id_key=e.konto_id_key
           AND b.buchdat BETWEEN &hjanfang AND &datum
           AND COALESCE(b.artnr,0)!=992444
           AND b.vfart NOT IN (2,4)
           AND b.vtg!=21
           AND e.vtinfogrp!=9999
           AND e.firma=b.firma)"
      - "cldm_{sst}_f_ecat_1 k LEFT OUTER ON (b.auftrnr_key=k.auftrnr_key
           AND b.konto_id_key=k.konto_id_key AND b.buchdat=k.buchdat)"

    filter:
      - e.firma IN (SELECT wert FROM cc_firma WHERE sst IN (&6))

    group_by:
      [buchdatnr, firma, vtinfogrp, anlaktionscode, altjungakt, mehrlinien, jahrgang,
       onlinetest, shopanteiligkeit, konto_id_key, auftrnr_key, auftrpos, katart,
       art_id, artnr, promnr, artgr, wechselkurs, ecc, auftrart, bestellkanal,
       nettoausschluss, appinfo, bestellmedium, auftrdat, anlvtsaison, bestellkanalpaid, umseksaison]

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 5.1 ────────────────────────────────────────────────────────────────
  - step: "5.1"
    name: Attributionsdaten holen
    target: cldm_{sst}_f_ecat_5
    sources: [cc_snow_attribution, cc_bestellkanal_akt_v, cldm_{sst}_f_ecat_3]
    output_spalten: [dwh_cr_load_id, auftrnr_key, konto_id_key, firma, factor_percent, ecc, bestellkanal]

    logik: |
      Zwei INSERT-Blöcke:

      INSERT 1 – aktuelle Saison:
        cc_snow_attribution JOIN cc_bestellkanal_akt_v ON (ecc=b.ecc)
        Filter: TRUNC(auftrdat+1) BETWEEN &hjanfang AND &datum
                AND b.auftrart = 4  (nur Internet-Aufträge!)

      INSERT 2 – Daten VOR Saisonanfang (Altdaten):
        gleiche Joins
        Filter: TRUNC(auftrdat+1) < &hjanfang
                AND (auftrnr_key, firma) IN (SELECT ... FROM cldm_&5._f_ecat_3)
                (nur Altdaten, die in _3 bereits vorkommen)

    gemeinsame_filter:
      - &termin BETWEEN ccattr.dwh_valid_from AND ccattr.dwh_valid_to
      - ccattr.firma IN (SELECT wert FROM cc_firma_akt_v WHERE sst IN (&6))
      - COALESCE(ccattr.konto_id_key,'0') != '0'
      - b.auftrart = 4   # NUR Internet-Aufträge werden attribuiert

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 5.2 ─────────────────────────��──────────────────────────────────────
  - step: "5.2"
    name: Attribution mit Buchungsdaten verknüpfen + Werte berechnen
    target: cldm_{sst}_f_ecat_6
    sources: [cldm_{sst}_f_ecat_3, cldm_{sst}_f_ecat_5, cldm_{sst}_f_ecat_1]
    output_spalten:
      [dwh_cr_load_id, buchdatnr, auftrdat, firma, konto_id_key, auftrnr_key,
       auftrpos, art_id, promnr, ecc, bestellkanal,
       ansprwert_attr, numswert_attr, auftraege_attr]

    logik: |
      Zwei INSERT-Blöcke:

      INSERT 1 – Normalfall (konto_id_key ÜBEREINSTIMMT):
        _3 JOIN _5 ON (auftrnr_key AND konto_id_key)
        LEFT JOIN _1 ON (auftrnr_key + konto_id_key + buchdatnr)

      INSERT 2 – Retoure (konto_id_key ÄNDERT sich):
        _3 JOIN _5 ON (auftrnr_key AND konto_id_key != c.konto_id_key)
        LEFT JOIN _1 ON (auftrnr_key + konto_id_key + buchdatnr)

      Berechnungen:
        ansprwert_attr  = factor_percent * ansprohnerabattwert (wenn != 0)
        numswert_attr   = factor_percent * numsohnerabattwert  (wenn != 0)
        auftraege_attr  = k.auftraege * ansprmenge * factor_percent (wenn ansprmenge > 0)

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 5.3 (= 3b) ─────────────────────────────────────────────────────────
  - step: "3b"
    name: Attributionsdaten in _3 hinzuspielen (zweiter Durchlauf)
    target: cldm_{sst}_f_ecat_3
    sources: [cldm_{sst}_f_ecat_6, cldm_{sst}_f_ecat_3]
    warnung: |
      ZWEITER Schreibvorgang auf _3 – Tabelle ist NICHT leer!
      Fügt neue Zeilen mit allen Kennzahlen = 0 ein, aber
      ansprwert_attr / numswert_attr / auftraege_attr befüllt.

    logik: |
      JOIN _6 attr ON _3 ecat:
        auftrnr_key + buchdatnr + auftrpos + art_id + promnr + firma
      Alle regulären Kennzahlen (auftraege, ansprwert, brabswert etc.) = 0
      ecc + bestellkanal kommen aus attr (Attribution-Kanal)
      bestellkanalpaid = attr.bestellkanal (Attribution-Kanal)
      Alle Kundendaten (vtinfogrp, jahrgang etc.) kommen aus ecat (_3 Zeile)

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 6 ──────────────────────────────────────────────────────────────────
  - step: 6
    name: Buchungen gruppieren
    target: cldm_{sst}_f_ecat_7
    sources: [cldm_{sst}_f_ecat_3]

    logik: |
      Einfaches GROUP BY + SUM aller Kennzahlen aus _3 (nach beiden Passes 3a+3b).
      Alle Fakten aggregiert (auftraege, ansprwert, brabswert, numswert, retwert,
      niliwert, naliwert, ansprwert_attr, numswert_attr, auftraege_attr).

    group_by:
      [buchdatnr, firma, vtinfogrp, anlaktionscode, altjungakt, mehrlinien, jahrgang,
       onlinetest, konto_id_key, auftrnr_key, auftrpos, katart, art_id, artnr, promnr,
       artgr, wechselkurs, ecc, auftrart, bruttonetto, bestellkanal, appinfo,
       bestellmedium, auftrdat, anlvtsaison, bestellkanalpaid, umseksaison, shopanteiligkeit]

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 7 ──────────────────────────────────────────────────────────────────
  - step: 7
    name: Anzahl Einzel- und Gesamtpositionen
    target: cldm_{sst}_f_ecat_4
    sources: [cldm_{sst}_f_ecat_3]
    output_spalten: [dwh_cr_load_id, auftrnr_key, artnr, artgr, anzeinzelpos, anzgesamtpos]

    logik: |
      anzeinzelpos  = COUNT(DISTINCT artnr||'*'||artgr WHERE ansprmenge > 0)
      anzgesamtpos  = COUNT(DISTINCT artnr||'*'||promnr||'*'||artgr||'*'||auftrpos WHERE ansprmenge > 0)
      GROUP BY auftrnr_key, artnr, artgr

    post: COMMIT + PKG_STATS.GATHERTABLE

  # ── STEP 8 / 8b ─────────────────────────────────────────────────────────────
  - step: "8"
    name: Stage Brutto
    target: cldm_{sst}_f_ecat_brutto
    sources: [cldm_{sst}_f_ecat_7, cc_firma, cldm_{sst}_f_ecat_4]

    brutto_netto_definition: |
      BRUTTO = ALLE Zeilen aus _7 (kein bruttonetto-Filter)
      NETTO  = WHERE bruttonetto IN (1, -3)  ← einziger Unterschied!

    logik: |
      JOIN cc_firma b ON (c.firma=b.wert AND b.dwh_status=1)
        → liefert bez = firmabez (Firmabezeichnung als String)
      LEFT JOIN cldm_{sst}_f_ecat_4 e ON (auftrnr_key + artnr + artgr)
        → liefert anzeinzelpos, anzgesamtpos

      Berechnungen:
        alterswert = SUBSTR(buchdatnr,1,4) - jahrgang (0 wenn jahrgang=0)
        artikelposition = anzeinzelpos/anzgesamtpos (wenn ansprmenge>0 AND anzgesamtpos>0)
        katart: NULL AND firma=74 → -2 (Sheego-Fix ##.37)
        appinfo:      buchdatnr <= 20200930 AND NOT IN (-3,-2) → -2
        bestellmedium: buchdatnr <= 20200930 AND NOT IN (-3,-2) → -2

    post: COMMIT

  - step: "8b"
    name: Stage Netto
    target: cldm_{sst}_f_ecat_netto
    sources: [cldm_{sst}_f_ecat_7, cc_firma, cldm_{sst}_f_ecat_4]
    logik: "Identisch mit Brutto + zusätzlicher Filter: WHERE c.bruttonetto IN (1, -3)"
    post: COMMIT + PKG_STATS.GATHERTABLE (beide)

  # ── STEP 9 / 9b ─────────────────────────────────────────────────────────────
  - step: "9"
    name: Wochenaggregate Brutto (kwkum)
    target: cldm_{sst}_f_ecat_kwkum_brutto
    sources:
      - cldm_{sst}_f_ecat_brutto
      - cc_kalender          # Cursor: alle Witt-Wochen zwischen hjanfang und datum
      - cc_vtinfogrp         # verd1sort4 = vtinfogrp_a14
      - cc_bestellkanal      # verd1sort4 = bestellkanal_a14
      - cc_katart            # verd1sort2 = katart_a12
      - cc_art               # bestandsfirma
      - cc_marktkz           # LEFT → obermarktkz-Kette
      - cc_obermarktkz       # LEFT → verd1sort1 = marktkz_a12

    logik: |
      PL/SQL-Cursor über DISTINCT witt_woche_id aus cc_kalender (hjanfang–datum).
      Je Woche: INSERT mit buchdatnr BETWEEN witt_woche_start_tag AND witt_woche_ende_tag.
      Verdichtungen:
        marktkz_a12      = cc_obermarktkz.verd1sort1 (via cc_marktkz.obermarktkz)
        katart_a12       = cc_katart.verd1sort2
        vtinfogrp_a14    = cc_vtinfogrp.verd1sort4
        bestellkanal_a14 = cc_bestellkanal.verd1sort4
      Alle Kennzahlen per SUM aggregiert.

    group_by:
      [witt_woche_id, witt_woche_ende_tag, marktkz_a12, alterswert, altjungakt,
       anlaktionscode, bestellkanal_a14, ecc, firmabez, jahrgang, katart_a12,
       onlinetest, mehrlinien, vtinfogrp_a14, wechselkurs, bestandsfirma]

    post: COMMIT (je Loop-Iteration)

  - step: "9b"
    name: Wochenaggregate Netto (kwkum)
    target: cldm_{sst}_f_ecat_kwkum_netto
    sources: "Identisch mit 9, aber Quelle = cldm_{sst}_f_ecat_netto"
    post: COMMIT + PKG_STATS.GATHERTABLE (beide)

# ─── ABSCHLUSS-SKRIPT ─────────────────────────────────────────────────────────
abschluss:
  bedingung: DSVFehler IN ('00000','00010')
  steps:
    - A1: PKG_IM_PARTITION.P_ADD_RANGEPARTITION → dm_f_ecat_brutto + dm_f_ecat_netto (YYYYMM)
    - A2: TRUNCATE SUBPARTITION FOR (buchdat, firmabez) – Cursor über Stage Brutto
    - A3: PKG_IM_LADUNG.P_LADUNG_BEW → dm_f_ecat_brutto + dm_f_ecat_netto
    - A4: SELECT witt_woche_id FROM cc_kalender WHERE tag_datum=&datum → LIST-Partition
    - A5: TRUNCATE SUBPARTITION FOR (wittwochenr, firmabez) – Cursor über Stage kwkum
    - A6: PKG_IM_LADUNG.P_LADUNG_BEW → dm_f_ecat_kwkum_brutto + dm_f_ecat_kwkum_netto
    - A7: PKG_IM_LADUNG.P_LOADHISTORY(:DSV_ABSCHLUSS_ID) → udwh_loadhistory

# ─── BUSINESS LOGIC HIGHLIGHTS ───────────────────────────────────────────────
business_logic:

  auftraege_verteilung: |
    Auftragsanteil wird proportional nach ansprmenge auf Positionsebene verteilt:
    _1: auftraege = 1/SUM(ansprmenge) pro (auftrnr, konto, buchdat)
    _3: auftraege = k.auftraege * ansprmenge  (= Anteil je Position)

  meterware_sonderregel: |
    meterware=2 → Mengen mit SIGN() statt absoluter Menge
    (verhindert Übergewichtung bei Meterware-Artikeln)

  brutto_vs_netto: |
    Brutto = ALLE Buchungen
    Netto  = bruttonetto IN (1, -3)
    → Netto schließt bruttonetto=2 aus (Brutto-Kunden ohne Netto-Berechtigung?)

  attribution: |
    Nur Internet-Aufträge (auftrart=4) werden attribuiert.
    cc_snow_attribution enthält factor_percent je (auftrnr, konto, firma, ecc).
    Drei neue Kennzahlen: ansprwert_attr, numswert_attr, auftraege_attr.
    Retoure-Sonderfall: konto_id_key kann sich ändern → eigener INSERT-Block.

  shopanteiligkeit: |
    Ab 2021-07-01 (FS21): aus cc_kunde direkt.
    Vor 2021-07-01: -2 (nicht verfügbar).
    Dynamic SQL wegen DATE-Vergleich zur Laufzeit.

  heine_bestellkanal: |
    Heine (firma 48-52) hatte bestellkanal=-3 in cc_buchung.
    Korrektur: IF auftrart=4 THEN 16 ELSE auftrart.

  limango_kommentiert: |
    DELETE FROM kwkum/brutto/netto WHERE firmabez='limango DE' ist auskommentiert.
    War früher nötig, aktuell inaktiv (limango ggf. aus cc_firma SST entfernt).

  appinfo_bestellmedium_historisch: |
    Daten vor 2020-09-30: appinfo/bestellmedium → -2 (nicht erfasst vor diesem Datum).
    Ausnahme: -3 (unbekannt) bleibt -3.

# ─── ZIEL-TABELLEN ────────────────────────────────────────────────────────────
target_tables:
  - name: dm_f_ecat_brutto
    granularitaet: Position (auftrnr_key, auftrpos, art_id, promnr, buchdatnr, firma, ...)
    partition:     RANGE(YYYYMM aus buchdatnr)
    subpartition:  (buchdat=TRUNC(buchdatnr/100)*100+1, firmabez)
    inhalt:        Alle Buchungen (brutto + netto)

  - name: dm_f_ecat_netto
    granularitaet: Position (wie brutto)
    partition:     RANGE(YYYYMM)
    subpartition:  (buchdat, firmabez)
    inhalt:        Nur bruttonetto IN (1,-3)

  - name: dm_f_ecat_kwkum_brutto
    granularitaet: Aggregiert (wittwochenr, firmabez, marktkz_a12, katart_a12, ...)
    partition:     LIST(witt_woche_id)
    subpartition:  (wittwochenr, firmabez)
    inhalt:        Wochenweise SUM aus dm_f_ecat_brutto

  - name: dm_f_ecat_kwkum_netto
    granularitaet: Aggregiert (wie kwkum_brutto)
    partition:     LIST(witt_woche_id)
    subpartition:  (wittwochenr, firmabez)
