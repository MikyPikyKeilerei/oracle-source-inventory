job_name: sc_ww_adr
description: "Laedt Adressdaten aus mehreren laenderspezifischen Stage-Backup-Tabellen (DE, AT, IT, UA) in die Source-Core-Cleansing-Tabellen. Trennt Neuanlage/Update (N/U) von Loeschsaetzen (D). Fuehrt Referenzaufloesung gegen sc_ww_adresse durch und schreibt aufgeloeste Saetze in clsc_ww_adr, unaufgeloeste in clsc_ww_adr_e."
type: script
created_at: "xx.04.2016"
created_by: "Stefan Ernstberger"
last_changed: "22.02.2019"
last_changed_by: steern
change_count: 4
confluence_url: ""
migration_status: pending

target_table: sc_ww_adr

cleanse_tables:
  - clsc_ww_adr
  - clsc_ww_adr_1
  - clsc_ww_adr_d
  - clsc_ww_adr_e

source_tables:
  - st_ww_adr_de_b
  - st_ww_adr_at_b
  - st_ww_adr_it_b
  - st_ww_adr_ua_b

lookup_tables:
  - sc_ww_adresse

db_links: []

precondition_tables: []
precondition_processes: []

parameters:
  - termin   # WHERE dwh_processdate = &termin
  - gbvid    # dwh_cr_load_id = &gbvid

packages:
  - PKG_STATS.GATHERTABLE
  - PKG_IM_LADUNG.P_SC_ERROR_HANDLING

sections:
  - id: "PARAM"
    description: "Ausgabe der Parameter: Prozessdatum (&termin) und GBV-Job-ID (&gbvid)"
  - id: "1"
    description: "Source Core-Ladung – Endtabellen sc_ww_adr / sc_ww_adr_ver"
  - id: "1.1"
    description: "Cleansing-Tabellen leeren: TRUNCATE clsc_ww_adr, clsc_ww_adr_1, clsc_ww_adr_d"
  - id: "1.2"
    description: "Daten aus Stage-Backup DE (st_ww_adr_de_b) -> clsc_ww_adr_1 (N/U) / clsc_ww_adr_d (D)"
  - id: "1.3"
    description: "Daten aus Stage-Backup AT (st_ww_adr_at_b) -> clsc_ww_adr_1 (N/U) / clsc_ww_adr_d (D)"
  - id: "1.4"
    description: "Daten aus Stage-Backup IT (st_ww_adr_it_b) -> clsc_ww_adr_1 (N/U) / clsc_ww_adr_d (D)"
  - id: "1.5"
    description: "Daten aus Stage-Backup UA (st_ww_adr_ua_b) -> clsc_ww_adr_1 (N/U) / clsc_ww_adr_d (D)"
  - id: "1.6"
    description: "Statistiken: PKG_STATS.GATHERTABLE fuer clsc_ww_adr_1, clsc_ww_adr_d"
  - id: "1.7"
    description: "Error Handling: PKG_IM_LADUNG.P_SC_ERROR_HANDLING fuer clsc_ww_adr / id_key"
  - id: "1.8"
    description: "Referenzaufloesung gegen sc_ww_adresse: aufgeloeste Saetze -> clsc_ww_adr, unaufgeloeste -> clsc_ww_adr_e"
  - id: "2.0"
    description: "Statistiken: PKG_STATS.GATHERTABLE fuer clsc_ww_adr, clsc_ww_adr_e"

notes: |
  - Unsicherheit: Header nennt sc_ww_adr und sc_ww_adr_ver als Endtabellen, aber der Code schreibt
    nur in clsc_ww_adr*. Uebernahme nach sc_ww_adr/_ver durch nachgelagerten Prozess (nicht sichtbar).
  - st_ww_adr_ch_b (Schweiz) im Header erwaehnt, wird bewusst NICHT geladen (Kommentar: 'wird auf KK-Seite geladen').
  - Ursprungsland wird als Literal-Konstante gesetzt ('DE', 'AT', 'IT', 'UA'), nicht aus Quelldaten.
  - Bestimmte adresseid_key-Werte per NOT IN-Filter ausgeschlossen (DE: 2 Werte, AT: 2 Werte).
  - Keine DB-Links im ausfuehrbaren Code.
  - Keine GBV_BATCH_JOB- oder udwh_loadhistory-Preconditions.
  - ALTER SESSION ENABLE PARALLEL DML aktiv.
