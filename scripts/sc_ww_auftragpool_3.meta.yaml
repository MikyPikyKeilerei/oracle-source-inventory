notes: |
  - Unsicherheit: _ver-Endtabellen werden im Code nicht direkt beschrieben; Befuellung durch
    nachgelagerten Prozess (nicht sichtbar).
  - clsc_ww_auftrag_auftpool_e wird NICHT per TRUNCATE geleert; akkumuliert Fehler ueber mehrere Laeufe.
  - sc_ww_auftrag_posstat zweifach gejoint (posstat und posstat1/ersthg).
  - ALFA-Referenzaufloesung (sc_ww_alfa_ersatz, sc_ww_alfa_grvt) 08.11.2017 entfernt; Felder als rohe IDs.
  - sc_ww_benutzerletztaend im Header, aber 29.05.2019 durch sc_ww_prozessletztaend ersetzt.
  - DSGVO: auftridentnr, ezvtransaktionid (04.01.2024), auftrposidentnr, id (20.12.2023) entfernt.
  - Keine DB-Links, keine GBV_BATCH_JOB-Preconditions.
  - ALTER SESSION ENABLE PARALLEL DML aktiv.
